name: Parabank Automation Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main      

  workflow_dispatch:

jobs:
  tests:

    runs-on: ubuntu-latest

    steps:

      # Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Bypass Cloudflare for GitHub Action
        uses: xiaotianxt/bypass-cloudflare-for-github-action@v2.1.0
        with:
          cf_account_id: ${{ secrets.CF_ACCOUNT_ID }}
          cf_zone_id: ${{ secrets.CF_ZONE_ID }}
          cf_api_token: ${{ secrets.CF_API_TOKEN }}
      - name: Send request to Cloudflare-protected server
        run: curl https://example.com/api
      
      # Cache pip dependencies
      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Install dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Create reports directory
      - name: Create Reports Folder
        run: mkdir -p reports

      # Run PyTest Tests
      - name: Run Tests
        run: |
          pytest \
          --html=reports/report.html \
          --self-contained-html

      # Upload HTML Report
      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-report
          path: reports/report.html

      - name: Run Tests
        run: |
          pytest -v -s --maxfail=1
    
      # Show test summary in GitHub Actions
      - name: Test Summary
        if: always()
        run: |
          echo "PyTest execution completed."
